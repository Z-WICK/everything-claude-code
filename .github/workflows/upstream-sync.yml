name: Upstream Sync

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: Upstream branch to sync into the fork
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync-upstream:
    name: Sync upstream into fork PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare upstream sync branch
        id: prepare
        env:
          UPSTREAM_REPO: affaan-m/everything-claude-code
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch }}
          UPSTREAM_SYNC_BASE_BRANCH: main
          UPSTREAM_SYNC_BRANCH: automation/upstream-sync
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: node scripts/automation/prepare-upstream-sync.js

      - name: Push sync branch
        if: steps.prepare.outputs.has_changes == 'true'
        run: git push --force-with-lease origin "HEAD:${{ steps.prepare.outputs.sync_branch }}"

      - name: Delete stale sync branch
        if: steps.prepare.outputs.has_changes != 'true'
        run: git push origin --delete "${{ steps.prepare.outputs.sync_branch }}" || true

      - name: Reconcile upstream sync PR
        uses: actions/github-script@v7
        env:
          BASE_BRANCH: ${{ steps.prepare.outputs.base_branch }}
          SYNC_BRANCH: ${{ steps.prepare.outputs.sync_branch }}
          HAS_CHANGES: ${{ steps.prepare.outputs.has_changes }}
          PR_TITLE: ${{ steps.prepare.outputs.pr_title }}
          PR_BODY: ${{ steps.prepare.outputs.pr_body }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.BASE_BRANCH;
            const headBranch = process.env.SYNC_BRANCH;
            const head = `${owner}:${headBranch}`;
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const title = process.env.PR_TITLE;
            const body = process.env.PR_BODY;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
            });

            const existing = pulls[0];

            if (hasChanges) {
              if (existing) {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existing.number,
                  title,
                  body,
                });
                core.info(`Updated upstream sync PR #${existing.number}`);
              } else {
                const { data: pullRequest } = await github.rest.pulls.create({
                  owner,
                  repo,
                  base,
                  head: headBranch,
                  title,
                  body,
                  maintainer_can_modify: true,
                });
                core.info(`Created upstream sync PR #${pullRequest.number}`);
              }

              return;
            }

            if (!existing) {
              core.info('No upstream sync diff and no open PR to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: 'Closing this automated upstream sync PR because the sync branch no longer differs from `main`.',
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: existing.number,
              state: 'closed',
            });

            core.info(`Closed stale upstream sync PR #${existing.number}`);
